<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Reservasi - Elegance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="brand">Elegance.</a>
        <div class="nav-links">
            <a href="index.html">Kembali ke Home</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="text-align: center; color: var(--gold); margin-bottom: 2rem;">Pesan Meja Anda</h2>
        
        <h3 style="margin-bottom: 1rem;">1. Pilih Meja</h3>
        <div class="tables-grid" id="tableGrid">
            </div>

        <form id="reservationForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="name" required placeholder="Cth: John Doe">
            </div>
            <div class="form-group">
                <label>Nomor Telepon</label>
                <input type="tel" id="phone" required placeholder="Cth: 08123456789">
            </div>
            <div class="form-group">
                <label>Jumlah Orang (Pax)</label>
                <input type="number" id="pax" required min="1" max="10" placeholder="Maks. 10 orang">
            </div>
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Waktu</label>
                <select id="time" required>
                    <option value="">Pilih Waktu</option>
                    <option value="18:00">18:00</option>
                    <option value="19:00">19:00</option>
                    <option value="20:00">20:00</option>
                </select>
            </div>
            <button type="submit" class="btn-gold" style="width: 100%;" id="submitBtn">Konfirmasi Reservasi</button>
        </form>
    </div>

    <div id="toast" class="toast">Notifikasi disini</div>

    <script src="js/main.js"></script>
    <script src="js/reservation.js"></script>
</body>
</html>
