<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Elegance</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; color: var(--text-color); }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #444; }
        th { color: var(--gold); }
        .btn-danger { background: #ff4c4c; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">Elegance.</a>
        <div class="nav-links">
            <a href="index.html">Kembali ke Home</a>
            <button id="logoutBtn" class="hidden" style="background: none; border: 1px solid var(--gold); color: var(--gold); padding: 0.3rem 0.8rem; cursor: pointer; border-radius: 4px; margin-left: 2rem;">Logout</button>
        </div>
    </nav>

    <div class="container" id="loginSection">
        <h2 style="text-align: center; color: var(--gold); margin-bottom: 2rem;">Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-gold" style="width: 100%;">Login</button>
        </form>
    </div>

    <div class="container hidden" id="dashboardSection" style="max-width: 1000px;">
        <h2 style="color: var(--gold); margin-bottom: 1rem;">Daftar Reservasi</h2>
        <div style="overflow-x: auto;">
            <table id="reservationsTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Waktu</th>
                        <th>Nama</th>
                        <th>No HP</th>
                        <th>Pax</th>
                        <th>Meja</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
